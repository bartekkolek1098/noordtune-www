<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">ECU tuning laptop visual</title>
  <desc id="desc">Dark workshop style visual with laptop, ECU traces and red performance accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090a0b"/>
      <stop offset=".55" stop-color="#111317"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="red" cx=".74" cy=".28" r=".55">
      <stop offset="0" stop-color="#e30613" stop-opacity=".55"/>
      <stop offset=".38" stop-color="#e30613" stop-opacity=".14"/>
      <stop offset="1" stop-color="#e30613" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#red)"/>
  <g opacity=".18" stroke="#fff" stroke-width="1">
