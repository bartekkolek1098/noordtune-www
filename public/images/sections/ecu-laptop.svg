    <rect x="185" y="120" width="670" height="300" rx="18" fill="#0d1117" stroke="#3a4149" stroke-width="5"/>
    <path d="M65 485h910l88 120H0z" fill="#14171b" stroke="#3a4149" stroke-width="6"/>
    <path d="M305 520h430l35 48H270z" fill="#050505" opacity=".88"/>
