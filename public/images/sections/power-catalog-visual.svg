<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">NoordTune Power Catalog visual</title>
  <desc id="desc">Dark branded catalog interface showing RDW, manual selection, Stage tuning and advisory tiles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset=".55" stop-color="#101214"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="red" cx=".78" cy=".2" r=".6">
      <stop offset="0" stop-color="#e30613" stop-opacity=".56"/>
      <stop offset=".45" stop-color="#e30613" stop-opacity=".12"/>
      <stop offset="1" stop-color="#e30613" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#red)"/>
  <g transform="translate(155 135)">
    <rect width="1290" height="640" rx="20" fill="#07090c" stroke="#313941" stroke-width="6"/>
    <g font-family="Arial, sans-serif" font-weight="900">
      <text x="70" y="90" fill="#e30613" font-size="28">NOORDTUNE POWER CATALOG</text>
      <text x="70" y="162" fill="#fff" font-size="64">CHECK YOUR CAR</text>
      <text x="70" y="214" fill="#fff" opacity=".62" font-size="24">RDW / HANDMATIG / STAGE 1-3+ / DSG-TCU / ADVIES</text>
    </g>
    <g transform="translate(70 300)">
      <g fill="#10151b" stroke="#303a44" stroke-width="4">
        <rect width="260" height="160"/>
        <rect x="300" width="260" height="160"/>
        <rect x="600" width="260" height="160"/>
        <rect x="900" width="260" height="160"/>
      </g>
      <g font-family="Arial, sans-serif" font-weight="900">
        <text x="34" y="58" fill="#e30613" font-size="28">RDW</text>
        <text x="34" y="110" fill="#fff" font-size="24">KENTEKEN</text>
        <text x="334" y="58" fill="#e30613" font-size="28">MANUAL</text>
        <text x="334" y="110" fill="#fff" font-size="24">MODEL / MOTOR</text>
        <text x="634" y="58" fill="#e30613" font-size="28">STAGE</text>
        <text x="634" y="110" fill="#fff" font-size="24">1 / 2 / 3+</text>
        <text x="934" y="58" fill="#e30613" font-size="28">ADVIES</text>
        <text x="934" y="110" fill="#fff" font-size="24">NOORDTUNE</text>
      </g>
    </g>
    <path d="M70 560h1160" stroke="#e30613" stroke-width="8" filter="url(#glow)"/>
  </g>
  <path d="M0 815h1600v185H0z" fill="#020202" opacity=".72"/>
</svg>
