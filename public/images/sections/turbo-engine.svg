<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Turbo engine detail visual</title>
  <desc id="desc">Stylized turbocharger and engine bay in a dark red performance atmosphere.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset=".45" stop-color="#151515"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="red" cx=".72" cy=".36" r=".58">
      <stop offset="0" stop-color="#e30613" stop-opacity=".55"/>
      <stop offset=".42" stop-color="#e30613" stop-opacity=".12"/>
      <stop offset="1" stop-color="#e30613" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#red)"/>
  <g transform="translate(875 235)">
    <circle cx="180" cy="180" r="170" fill="#090b0d" stroke="#3e454c" stroke-width="18"/>
    <circle cx="180" cy="180" r="108" fill="#050505" stroke="#606873" stroke-width="9"/>
    <g stroke="#d9dde2" stroke-width="16" stroke-linecap="round" opacity=".78">
      <path d="M180 180 180 80"/>
      <path d="M180 180 264 126"/>
      <path d="M180 180 270 228"/>
      <path d="M180 180 182 286"/>
      <path d="M180 180 94 232"/>
      <path d="M180 180 91 126"/>
    </g>
    <path d="M330 170h205c64 0 110 46 110 110v28" fill="none" stroke="#252b31" stroke-width="56" stroke-linecap="round"/>
    <path d="M330 170h205c64 0 110 46 110 110v28" fill="none" stroke="#4d5963" stroke-width="18" stroke-linecap="round"/>
  </g>
  <g transform="translate(170 285)" fill="none" stroke-linecap="round">
    <path d="M0 240h360c70 0 112-42 153-96l60-78c48-63 105-94 188-94h155" stroke="#2d343b" stroke-width="70"/>
    <path d="M0 240h360c70 0 112-42 153-96l60-78c48-63 105-94 188-94h155" stroke="#75808b" stroke-width="15" opacity=".65"/>
