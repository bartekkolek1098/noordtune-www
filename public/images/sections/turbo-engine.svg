    <path d="M905 600h420"/>
  </g>
  <g font-family="Arial, sans-serif" font-weight="900" fill="#fff" opacity=".9">
    <text x="126" y="160" font-size="48">BOOST CONTROL</text>
    <text x="126" y="212" font-size="24" fill="#e30613">TURBO / AIRFLOW / TORQUE</text>
