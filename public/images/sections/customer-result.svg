<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Customer result visual</title>
  <desc id="desc">Dark customer result board with vehicle data, stock and tuned figures, and red accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset=".5" stop-color="#111317"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="red" cx=".78" cy=".28" r=".62">
      <stop offset="0" stop-color="#e30613" stop-opacity=".5"/>
      <stop offset=".42" stop-color="#e30613" stop-opacity=".1"/>
      <stop offset="1" stop-color="#e30613" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#red)"/>
  <g transform="translate(140 150)">
    <rect width="1320" height="620" rx="20" fill="#080a0d" stroke="#303840" stroke-width="6"/>
    <g font-family="Arial, sans-serif" font-weight="900">
      <text x="70" y="90" fill="#e30613" font-size="28">CUSTOMER RESULT</text>
      <text x="70" y="158" fill="#fff" font-size="68">BMW 330d STAGE 1</text>
      <text x="70" y="218" fill="#fff" font-size="24" opacity=".65">INDICATIEVE CASE / VOERTUIGAFHANKELIJK</text>
    </g>
    <g transform="translate(70 300)">
      <rect width="360" height="190" fill="#11161b" stroke="#2f3943" stroke-width="4"/>
      <rect x="420" width="360" height="190" fill="#141014" stroke="#e30613" stroke-opacity=".45" stroke-width="4"/>
      <rect x="840" width="300" height="190" fill="#11161b" stroke="#2f3943" stroke-width="4"/>
      <g font-family="Arial, sans-serif" font-weight="900">
        <text x="34" y="58" fill="#fff" opacity=".6" font-size="24">ORIGINEEL</text>
        <text x="34" y="125" fill="#fff" font-size="52">265 PK</text>
        <text x="34" y="164" fill="#fff" opacity=".72" font-size="30">580 NM</text>
        <text x="454" y="58" fill="#e30613" font-size="24">GETUNED</text>
        <text x="454" y="125" fill="#fff" font-size="52">320 PK</text>
        <text x="454" y="164" fill="#fff" opacity=".72" font-size="30">680 NM</text>
        <text x="874" y="58" fill="#fff" opacity=".6" font-size="24">WINST</text>
        <text x="874" y="125" fill="#e30613" font-size="56">+55 PK</text>
      </g>
    </g>
  </g>
  <g transform="translate(900 650)" fill="none" stroke-linecap="round">
    <path d="M60 130h400c44 0 74-18 108-52l-78-18-62-52H202l-60 58-94 18z" stroke="#5f6872" stroke-width="8"/>
    <circle cx="176" cy="140" r="42" stroke="#6a747e" stroke-width="12"/>
    <circle cx="440" cy="140" r="42" stroke="#6a747e" stroke-width="12"/>
  </g>
  <path d="M0 810h1600v190H0z" fill="#020202" opacity=".78"/>
